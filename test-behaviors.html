<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Behaviors</title>
    <style>
        body { margin: 0; overflow: hidden; background: black; font-family: monospace; }
        canvas { display: block; cursor: default; }
        .controls {
            position: fixed;
            bottom: 20px;
            left: 20px;
            background: rgba(0,0,0,0.8);
            padding: 15px;
            border-radius: 8px;
            color: white;
            z-index: 100;
            backdrop-filter: blur(5px);
            min-width: 220px;
        }
        select, button {
            margin: 5px;
            padding: 8px 15px;
            font-size: 14px;
            cursor: pointer;
        }
        .param-slider {
            margin: 10px 0;
        }
        .param-slider label {
            display: inline-block;
            width: 60px;
        }
        .info {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(0,0,0,0.8);
            padding: 10px 15px;
            border-radius: 8px;
            color: white;
            font-size: 12px;
            z-index: 100;
        }
    </style>
</head>
<body>
    <canvas id="particle-canvas"></canvas>
    <div class="controls">
        <label><strong>🎮 Поведение:</strong></label>
        <select id="behavior-select">
            <option value="followMouse">🐭 Следование за курсором</option>
            <option value="repulse">💨 Отталкивание от курсора</option>
            <option value="gravity">🌍 Гравитация (между частицами)</option>
        </select>
        
        <div id="repulse-params" style="display: none; margin-top: 10px;">
            <div class="param-slider">
                <label>Радиус:</label>
                <input type="range" id="repulse-radius" min="50" max="400" value="150">
                <span id="radius-val">150</span>
            </div>
            <div class="param-slider">
                <label>Сила:</label>
                <input type="range" id="repulse-force" min="0.5" max="10" step="0.5" value="3.0">
                <span id="force-val">3.0</span>
            </div>
        </div>
        
        <button id="reset">🔄 Сбросить частицы</button>
    </div>
    <div class="info">
        <div>📊 Частиц: <span id="particle-count">500</span></div>
        <div>🎨 Текущее: <span id="current-behavior">followMouse</span></div>
    </div>
    
    <script type="module">
        import { ParticleSystem } from './src/index.ts';
        
        const canvas = document.getElementById('particle-canvas');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        
        const ps = new ParticleSystem();
        
        await ps.init({
            canvas: canvas,
            config: {
                particleCount: 5000,
                colors: ['#FF69B4', '#FFFFFF', '#00FFAA', '#FFAA00', '#00AAFF'],
                particleSize: 4,
                maxSpeed: 2,
                behavior: 'followMouse'
            }
        });
        
        const select = document.getElementById('behavior-select');
        const currentBehaviorSpan = document.getElementById('current-behavior');
        const repulseParamsDiv = document.getElementById('repulse-params');
        const radiusSlider = document.getElementById('repulse-radius');
        const forceSlider = document.getElementById('repulse-force');
        const radiusVal = document.getElementById('radius-val');
        const forceVal = document.getElementById('force-val');
        
        // Обновление параметров Repulse при смене слайдеров
        function updateRepulseParams() {
            if (select.value === 'repulse') {
                const radius = parseInt(radiusSlider.value);
                const force = parseFloat(forceSlider.value);
                ps.setBehavior('repulse', { radius, force });
            }
        }
        
        radiusSlider.addEventListener('input', () => {
            radiusVal.textContent = radiusSlider.value;
            updateRepulseParams();
        });
        
        forceSlider.addEventListener('input', () => {
            forceVal.textContent = forceSlider.value;
            updateRepulseParams();
        });
        
        select.addEventListener('change', (e) => {
            const behavior = e.target.value;
            ps.setBehavior(behavior);
            currentBehaviorSpan.textContent = behavior;
            
            if (behavior === 'repulse') {
                repulseParamsDiv.style.display = 'block';
                updateRepulseParams();
            } else {
                repulseParamsDiv.style.display = 'none';
            }
        });
        
        document.getElementById('reset').addEventListener('click', () => {
            ps.destroy();
            ps.init({
                canvas: canvas,
                config: {
                    particleCount: 500,
                    colors: ['#FF69B4', '#FFFFFF', '#00FFAA', '#FFAA00', '#00AAFF'],
                    particleSize: 4,
                    maxSpeed: 2,
                    behavior: select.value
                }
            });
        });
        
        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });
    </script>
</body>
</html>
