<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gravity Test - Moving Particle Ball</title>
    <style>
        body { margin: 0; overflow: hidden; background: black; font-family: monospace; }
        canvas { display: block; cursor: default; }
        .info {
            position: fixed;
            top: 20px;
            left: 20px;
            background: rgba(0,0,0,0.7);
            padding: 10px 15px;
            border-radius: 8px;
            color: white;
            font-size: 14px;
            z-index: 100;
            pointer-events: none;
        }
        .controls {
            position: fixed;
            bottom: 20px;
            left: 20px;
            background: rgba(0,0,0,0.7);
            padding: 10px 15px;
            border-radius: 8px;
            color: white;
            z-index: 100;
        }
        button {
            padding: 5px 15px;
            margin-left: 10px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <canvas id="particle-canvas"></canvas>
    <div class="info">
        <strong>🌍 Гравитация</strong><br>
        Нажми и удерживай ЛКМ — частицы соберутся в шар<br>
        Веди мышью — шар движется<br>
        Отпусти — частицы разлетятся
    </div>
    <div class="controls">
        <label>Сила: <span id="strength-val">0.1</span></label>
        <input type="range" id="strength-slider" min="0.02" max="0.3" step="0.01" value="0.1">
        <button id="reset">Сбросить частицы</button>
    </div>
    
    <script type="module">
        import { ParticleSystem } from './src/index.ts';
        
        const canvas = document.getElementById('particle-canvas');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        
        const ps = new ParticleSystem();
        
        await ps.init({
            canvas: canvas,
            config: {
                particleCount: 10000,
                colors: ['#FF69B4', '#FFFFFF', '#00FFAA', '#FFAA00', '#00AAFF'],
                particleSize: 4,
                maxSpeed: 2,
                behavior: 'gravity'
            }
        });
        
        const strengthSlider = document.getElementById('strength-slider');
        const strengthVal = document.getElementById('strength-val');
        
        strengthSlider.addEventListener('input', () => {
            const val = parseFloat(strengthSlider.value);
            strengthVal.textContent = val;
            ps.setBehavior('gravity', { strength: val, maxSpeed: 4 });
        });
        
        document.getElementById('reset').addEventListener('click', () => {
            ps.destroy();
            ps.init({
                canvas: canvas,
                config: {
                    particleCount: 800,
                    colors: ['#FF69B4', '#FFFFFF', '#00FFAA', '#FFAA00', '#00AAFF'],
                    particleSize: 4,
                    maxSpeed: 2,
                    behavior: 'gravity'
                }
            });
        });
        
        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });
    </script>
</body>
</html>
