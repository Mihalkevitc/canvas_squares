<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Particle Library Test</title>
    <style>
        body { margin: 0; overflow: hidden; background: black; }
        canvas { display: block; width: 100%; height: 100vh; }
    </style>
</head>
<body>
    <canvas id="particle-canvas" style="width: 100%; height: 100vh;"></canvas>
    
    <script type="module">
        import { ParticleSystem } from './dist/particle-lib.es.js';
        
        const canvas = document.getElementById('particle-canvas');
        const ps = new ParticleSystem();
        
        ps.init({
            canvas: canvas,
            config: {
                particleCount: 1000,
                colors: ['#FF69B4', 'white', '#00FF00', '#FFA500'],
                particleSize: 3,
                maxSpeed: 4,
                behavior: 'followMouse'
            }
        });
    </script>
</body>
</html>
